name: Run Postman Tests + Generate Swagger

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'openapi.yaml'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install -g newman
          npm install js-yaml

      - name: Run Postman tests
        run: |
          newman run collection.json -e utho-environment.json

      - name: Convert Postman → OpenAPI
        run: |
          npx postman-to-openapi collection.json openapi.yaml

      - name: Normalize OpenAPI (servers + auth)
        run: |
          node scripts/normalize-openapi.js

      - name: Commit updated OpenAPI
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add openapi.yaml
          git diff --cached --quiet || git commit -m "Auto अपडेट OpenAPI (env + auth fixed)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git