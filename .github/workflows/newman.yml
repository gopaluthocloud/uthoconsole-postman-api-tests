name: Run Postman Tests + Generate Swagger

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          npm install -g newman
          npm install -g postman-to-openapi

      - name: Run Postman tests
        run: |
          newman run collection.json -e utho-environment.json

      - name: Convert to OpenAPI YAML
        run: |
          p2o collection.json -f openapi.yaml

      - name: Commit Swagger file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add openapi.yaml
          git commit -m "Update OpenAPI spec" || echo "No changes"
          git push